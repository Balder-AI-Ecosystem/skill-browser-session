name: skill-browser-session
version: 0.1.0
mode: local_plugin
entrypoint: src.skill_browser_session.main:Skill
core_api: ">=1.0,<2.0"
capabilities:
  - id: browser_session.observe_page
    description: Observe the current browser page or a target URL.
    input_schema:
      type: object
      properties:
        target:
          type: string
          description: "URL or window title to observe. Omit to use current active window."
        timeout_seconds:
          type: integer
          default: 30
      additionalProperties: false
    output_schema:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error, timeout]
        page_title:
          type: string
        page_url:
          type: string
        visible_text:
          type: string
        screenshot_path:
          type: ["string", "null"]
      required: [status]
    risk_level: low
    confirmation_required: false
    retry_policy: bounded_backoff
    observability_events:
      - browser_session.observe_page
  - id: browser_session.type_text
    description: Type text into the active browser window.
    input_schema:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: "Text to type, or selector/text to click/fill"
        dry_run:
          type: boolean
          default: false
        confirmed:
          type: boolean
          default: false
        confirmation_token:
          type: ["string", "null"]
        policy_approved:
          type: boolean
          default: false
        timeout_seconds:
          type: integer
          default: 30
      additionalProperties: false
    output_schema:
      type: object
    risk_level: medium
    confirmation_required: true
    retry_policy: manual_review
    observability_events:
      - browser_session.type_text
  - id: browser_session.click_text
    description: Click a visible control or text in the browser.
    input_schema:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: "Text to type, or selector/text to click/fill"
        dry_run:
          type: boolean
          default: false
        confirmed:
          type: boolean
          default: false
        confirmation_token:
          type: ["string", "null"]
        policy_approved:
          type: boolean
          default: false
        timeout_seconds:
          type: integer
          default: 30
      additionalProperties: false
    output_schema:
      type: object
    risk_level: medium
    confirmation_required: true
    retry_policy: manual_review
    observability_events:
      - browser_session.click_text
  - id: browser_session.fill_field
    description: Fill a visible field in the browser.
    input_schema:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: "Text to type, or selector/text to click/fill"
        dry_run:
          type: boolean
          default: false
        confirmed:
          type: boolean
          default: false
        confirmation_token:
          type: ["string", "null"]
        policy_approved:
          type: boolean
          default: false
        timeout_seconds:
          type: integer
          default: 30
      additionalProperties: false
    output_schema:
      type: object
    risk_level: medium
    confirmation_required: true
    retry_policy: manual_review
    observability_events:
      - browser_session.fill_field
  - id: browser_session.fill_form
    description: Fill a structured browser form.
    input_schema:
      type: object
      required: [fields]
      properties:
        fields:
          type: object
          description: "Mapping of field label/selector to value"
        dry_run:
          type: boolean
          default: false
        confirmed:
          type: boolean
          default: false
        confirmation_token:
          type: ["string", "null"]
        policy_approved:
          type: boolean
          default: false
      additionalProperties: false
    output_schema:
      type: object
    risk_level: medium
    confirmation_required: true
    retry_policy: manual_review
    observability_events:
      - browser_session.fill_form
  - id: browser_session.follow_link
    description: Follow a visible browser link.
    input_schema:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: "Link text or URL to follow"
        dry_run:
          type: boolean
          default: false
        confirmed:
          type: boolean
          default: false
        confirmation_token:
          type: ["string", "null"]
      additionalProperties: false
    output_schema:
      type: object
    risk_level: medium
    confirmation_required: true
    retry_policy: manual_review
    observability_events:
      - browser_session.follow_link
permissions:
  read_memory: false
  write_memory: false
  internet_access: true
  file_write: false
  external_actions: true
healthcheck:
  kind: python
  target: src.skill_browser_session.main:healthcheck
timeout_ms: 120000
enabled_by_default: true
